# Локальный запуск с PostgreSQL в Docker (docker compose -f docker-compose.yml -f docker-compose.local.yml up --build)

services:
  postgres:
    image: postgres:16-alpine
    container_name: rassrochka-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-rassrochka}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-rassrochka}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - rassrochka-net

  nginx:
    ports:
      - "${NGINX_PORT:-80}:80"

  backend:
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-rassrochka}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
