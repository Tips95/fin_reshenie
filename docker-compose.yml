# Timeweb Cloud App Platform (Docker Compose)
# - nginx должен быть первым сервисом (на него вешается домен)
# - нельзя использовать host-порты 80/443 и volumes
# - PostgreSQL подключается снаружи (Managed DB в Timeweb)

services:
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: rassrochka-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-9000}:80"
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started
    networks:
      - rassrochka-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
    container_name: rassrochka-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
    depends_on:
      backend:
        condition: service_started
    networks:
      - rassrochka-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rassrochka-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost"]}
      DATABASE_SSL_MODE: ${DATABASE_SSL_MODE:-}
      RUN_SEED: ${RUN_SEED:-true}
      INITIAL_ADMIN_EMAIL: ${INITIAL_ADMIN_EMAIL:-}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:-}
      INITIAL_ADMIN_NAME: ${INITIAL_ADMIN_NAME:-Администратор}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3)"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 120s
    networks:
      - rassrochka-net

networks:
  rassrochka-net:
    driver: bridge
